##############################
### WINDOWS AND WORKSPACES ###
##############################

# --- Terminal & Editors (Tiling & No Borders) ---
windowrule = match:class ^(org\.wezfurlong\.wezterm)$, tile true
windowrule = match:class ^(org\.wezfurlong\.wezterm)$, border_size 0
windowrule = match:class ^(Alacritty|zen|com\.mitchellh\.ghostty|kitty)$, border_size 0

# --- GNOME & GTK Apps ---
windowrule = match:class ^(org\.gnome\.), rounding 12
windowrule = match:class ^(org\.gnome\.), border_size 0

# Specific GNOME/GTK tools that should tile
windowrule = match:class ^(gnome-control-center|pavucontrol|nm-connection-editor)$, tile true

# --- Floating Rules ---
windowrule = match:class ^(gnome-calculator|galculator|blueman-manager|org\.gnome\.Nautilus|steam|xdg-desktop-portal|zoom)$, float true
windowrule = match:class ^(firefox)$, match:title ^(Picture-in-Picture)$, float true

# --- Global & Layer Rules ---
# Fixed syntax for the opacity rule in the new parser
windowrule = match:focus false, match:float false, opacity 1.0

# Layer rules
layerrule = match:namespace ^(quickshell)$, no_anim true
